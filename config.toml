baseURL = "https://kurotych.com"
theme = "PaperMod"
defaultContentLanguage = "en"
googleAnalytics = "G-HKDH744EMY"
enableRobotsTXT = false
displayFullLangName = true
title  = "Kurotych 🇺🇦"

[markup.goldmark.renderer]
unsafe = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[[params.socialIcons]]
name = "github"
url = "https://github.com/kurotych/"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/anatolii-kurotych/"

[[params.socialIcons]]
name = "email"
url = "mailto:akurotych@gmail.com"

[[params.socialIcons]]
name = "telegram"
url = "https://t.me/armatusmiles"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

[params.homeInfoMode]
enabled = true

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    [languages.en.params.homeInfoParams]
      Title = "Welcome"
      Content = "To my personal site. Here you can find information about me and my professional activity in software engineering."
    [[languages.en.menu.main]]
      name = "About Me"
      identifier = "about"
      url = "/about/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Certificates"
      identifier = "certificates"
      url = "/certificates/"
      weight = 2
    [[languages.en.menu.main]]
      name = "CV"
      identifier = "cv"
      url = "/cv.pdf"
      weight = 3

  [languages.ua]
    languageName = "Українська"
    languageCode = "uk"
    weight = 2
    [languages.ua.params.homeInfoParams]
      Title = "Ласкаво просимо"
      Content = "На мій персональний сайт. Тут ви можете знайти інформацію про мене та мою професійну діяльність у сфері програмної інженерії."
    [[languages.ua.menu.main]]
      name = "Про мене"
      identifier = "about"
      url = "/ua/about/"
      weight = 2
    [[languages.ua.menu.main]]
      name = "Сертифікати"
      identifier = "certificates"
      url = "/ua/certificates/"
      weight = 3
    [[languages.ua.menu.main]]
      name = "Курси"
      identifier = "courses"
      url = "/ua/courses/"
      weight = 1

